name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1 # Changed to 1: We only need the latest files!
          lfs: true
          
      - name: Build clean history and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Delete the GitHub git history so HF never sees old commits with the video
          rm -rf .git
          
          # 2. Start a fresh, clean git repository just for this deployment
          git init -b main
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 3. Add all current files, then explicitly UNTRACK the mp4 files
          git add .
          find . -name "*.mp4" -type f -exec git rm --cached {} + || true
          
          # 4. Make a single clean commit without the video
          git commit -m "Deploy to Hugging Face (excluding mp4 files)"
          
          # 5. Force push this clean slate to Hugging Face
          git push --force https://harinie4466:$HF_TOKEN@huggingface.co/spaces/harinie4466/micro-soc-gym main
